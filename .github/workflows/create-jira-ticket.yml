name: Create Jira Story on PR

on:
  pull_request:
    types: [opened]

jobs:
  create-story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Jira Story
        env:
          JIRA_CREATE_API: ${{ secrets.JIRA_URL }}
          USER_NAME: ${{ secrets.JIRA_USER_EMAIL }}
          API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DESCRIPTION=$(printf "PR: %s\n\nAuthor: %s\nBranch: %s\n\n%s" "${PR_URL}" "${PR_AUTHOR}" "${PR_BRANCH}" "${PR_BODY}")
          python3 create_jira_issue.py \
            --type Story \
            --project SCRUM \
            --summary "PR: ${PR_TITLE}" \
            --description "${DESCRIPTION}" \
            --priority Medium
